# .github/workflows/daily_pull.yml
name: Daily Fixture Pull

on:
  schedule:
    # Runs at 00:05 UTC every day (5-min offset avoids the midnight spike)
    - cron: "5 0 * * *"
  workflow_dispatch:   # also allows manual trigger from the GitHub Actions UI

jobs:
  pull-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily fixture pull
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGET_LEAGUE:        ${{ secrets.TARGET_LEAGUE }}
          TARGET_SEASON:        ${{ secrets.TARGET_SEASON }}
        run: python daily_pull.py
